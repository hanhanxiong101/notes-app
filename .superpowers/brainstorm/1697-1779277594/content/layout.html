<h2>你喜欢哪种页面布局？</h2>
<p class="subtitle">考虑日常使用的方便程度</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏布局</h3>
      <p>左侧固定侧边栏显示笔记列表和标签，右侧为主要编辑区。适合笔记多、需要频繁切换的场景，空间利用率高。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>列表+详情布局</h3>
      <p>首页显示笔记列表（卡片形式），点击后进入独立的编辑/查看页面。简洁直观，手机上也很好用。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>顶部标签布局</h3>
      <p>顶部有搜索栏和标签切换，下方为笔记卡片网格。适合用标签来组织笔记的习惯。</p>
    </div>
  </div>
</div>
